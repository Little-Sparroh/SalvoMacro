[config]
schemaVersion = "0.0.1"

[package]
namespace = "Sparroh"
name = "SalvoMacro"
description = "Configurable toggle auto-fire for wingsuit rocket salvo, with optional targeting model suppression."
websiteUrl = "https://github.com/Little-Sparroh/SalvoMacro"
containsNsfwContent = false

[package.dependencies]
BepInEx-BepInExPack_Mycopunk = "5.4.2403"

[build]
icon = "icon.png"
readme = "README.md"
outdir = "build"

[[build.copy]]
source = "bin/Release/net48/SalvoMacro.dll"
target = "BepInEx/plugins/SalvoMacro.dll"

[[build.copy]]
source = "CHANGELOG.md"
target = "CHANGELOG.md"

[[build.copy]]
source = "LICENSE"
target = "LICENSE"

[publish]
repository = "https://thunderstore.io"
communities = [ "mycopunk" ]

[publish.categories]
mycopunk = [ "client" ]
